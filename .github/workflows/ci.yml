name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: webtemplate_test
        ports:
          - 8889:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, pdo_mysql, gd, exif, intl, zip
          coverage: none

      - name: Install composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Code style (Pint)
        run: vendor/bin/pint --test

      - name: Optimize check (catches route/config errors before deploy)
        run: php artisan optimize
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 8889
          DB_USERNAME: root
          DB_PASSWORD: root

      - name: Run tests
        run: php artisan test

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Build frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
